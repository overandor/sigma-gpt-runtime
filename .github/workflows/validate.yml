name: Validate Policy and Receipts

on:
  push:
    paths:
      - 'policy/**'
      - 'space/**'
  pull_request:
    paths:
      - 'policy/**'
      - 'space/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyyaml pydantic

      - name: Validate policy YAML files
        run: |
          python ci/validate_policy.py

      - name: Validate OpenAPI schema
        run: |
          python ci/export_openapi.py

      - name: Check receipt format
        run: |
          python ci/validate_receipts.py
